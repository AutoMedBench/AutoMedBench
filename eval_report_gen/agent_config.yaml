# MedAgentsBench — Agent Configuration
# ======================================
#
# Each agent entry defines:
#   provider  — API provider (openai | anthropic | google | openai-compat)
#   model     — model ID passed to the provider API
#   base_url  — (optional) custom endpoint for OpenAI-compatible APIs
#   temperature — (optional) override global temperature
#
# For OpenAI-compatible providers (DeepSeek, Alibaba, Moonshot, Z AI),
# set provider: openai and supply base_url + OPENAI_API_KEY env var.
#
# For NVIDIA-backed agents below, `eval_report_gen/api_keys/key.txt` must contain
# exactly four lines, with one API key on each line.

agents:
  # --- OpenAI (via NVIDIA Inference API) ---
  gpt-5.4:
    provider: openai
    model: azure/openai/gpt-5.4
    base_url: https://inference-api.nvidia.com
    api_key_file: eval_report_gen/api_keys/key.txt
  o3-pro:
    provider: openai
    model: o3-pro

  # --- Anthropic (via NVIDIA Inference API) ---
  claude-opus-4-6:
    provider: openai
    model: aws/anthropic/bedrock-claude-opus-4-6
    base_url: https://inference-api.nvidia.com
    api_key_file: eval_report_gen/api_keys/key.txt
    reasoning: true
  claude-sonnet-4-6:
    provider: openai
    model: aws/anthropic/bedrock-claude-sonnet-4-6
    base_url: https://inference-api.nvidia.com
    api_key_file: eval_report_gen/api_keys/key.txt
    reasoning: true

  # --- Google ---
  gemini-3.1-pro:
    provider: openai
    model: gcp/google/gemini-3.1-pro-preview
    base_url: https://inference-api.nvidia.com
    api_key_file: eval_report_gen/api_keys/key.txt
  gemini-3-flash:
    provider: google
    model: gemini-3.0-flash

  # --- Qwen (via NVIDIA Inference API) ---
  qwen3.5-397b:
    provider: openai
    model: nvidia/qwen/qwen3-5-397b-a17b
    base_url: https://inference-api.nvidia.com
    api_key_file: eval_report_gen/api_keys/key.txt

  # --- Moonshot Kimi K2 Thinking (via OpenRouter) ---
  kimik2.5:
    provider: openai
    model: moonshotai/kimi-k2-thinking
    base_url: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_API_KEY}
    reasoning: true

  # --- DeepSeek (OpenAI-compatible) ---
  deepseek-v4:
    provider: openai
    model: deepseek-chat
    base_url: https://api.deepseek.com/v1
  deepseek-r1:
    provider: openai
    model: deepseek-reasoner
    base_url: https://api.deepseek.com/v1

  # --- NVIDIA Nemotron (via NVIDIA Inference API) ---
  nemotron-3-super-v3:
    provider: openai
    model: nvidia/nvidia/nemotron-3-super-v3
    base_url: https://inference-api.nvidia.com
    api_key_file: eval_report_gen/api_keys/key.txt

  # --- Llama Nemotron (via NVIDIA Inference API) ---
  llama3.3-nemotron-49b:
    provider: openai
    model: nvidia/nvidia/llama-3.3-nemotron-super-49b-v1.5
    base_url: https://inference-api.nvidia.com
    api_key_file: eval_report_gen/api_keys/key.txt

  # --- MiniMax (via NVIDIA Inference API) ---
  minimax-m2.5:
    provider: openai
    model: nvidia/minimaxai/minimax-m2.5
    base_url: https://inference-api.nvidia.com
    api_key_file: eval_report_gen/api_keys/key.txt

  # --- Z AI (via NVIDIA Inference API) ---
  glm-5:
    provider: openai
    model: nvidia/zai-org/glm-5
    base_url: https://inference-api.nvidia.com
    api_key_file: eval_report_gen/api_keys/key.txt

  # --- Z AI (OpenAI-compatible, direct) ---
  glm-5.1:
    provider: openai
    model: glm-5.1
    base_url: https://open.bigmodel.cn/api/paas/v4

# ---------------------------------------------------------------
