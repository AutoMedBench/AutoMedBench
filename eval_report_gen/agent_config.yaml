# ---------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------
settings:
  max_turns: 50          # max API round-trips per run
  max_time_s: 600        # wall-clock timeout (seconds)
  temperature: 0.0       # default sampling temperature
