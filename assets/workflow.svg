<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" width="1400" height="360"
     role="img" aria-label="Medical AutoResearch pipeline — UC Santa Cruz × NVIDIA — S1 Plan, S2 Setup, S3 Validate, S4 Inference, S5 Submit">
  <defs>
    <style><![CDATA[
      .bg       { fill: #141812; }
      .card     { fill: #1C201B; stroke: #2A2E28; stroke-width: 1.2; }
      .iconbg   { fill: #232A25; }
      .icon     { stroke: #84B38D; stroke-width: 1.7; fill: none;
                  stroke-linecap: round; stroke-linejoin: round; }
      .pulse    { stroke: #D88A7B; stroke-width: 2; fill: none;
                  stroke-linecap: round; stroke-linejoin: round; }
      .sid      { font-family: 'Fraunces', 'Georgia', 'Times New Roman', serif;
                  font-weight: 700; font-size: 13px; fill: #84B38D;
                  letter-spacing: 0.12em; }
      .sname    { font-family: 'Inter', 'Helvetica', sans-serif;
                  font-weight: 700; font-size: 24px; fill: #E4E6DC;
                  letter-spacing: 0.02em; }
      .sdesc    { font-family: 'Inter', 'Helvetica', sans-serif;
                  font-weight: 400; font-size: 13px; fill: #A0A69A; }
      .arrow    { stroke: #7E9770; stroke-width: 2.4; fill: none;
                  stroke-linecap: round; stroke-linejoin: round; }
      .arrowhd  { fill: #7E9770; }
      .header   { font-family: 'Fraunces', 'Georgia', 'Times New Roman', serif;
                  font-weight: 600; font-style: italic; font-size: 22px;
                  fill: #E4E6DC; }
      .badge    { font-family: 'Inter', 'Helvetica', sans-serif;
                  font-weight: 600; font-size: 12px; fill: #D88A7B;
                  letter-spacing: 0.14em; text-transform: uppercase; }
      .subhead  { font-family: 'Inter', 'Helvetica', sans-serif;
                  font-weight: 400; font-size: 14px; fill: #A0A69A; }
      .lx       { font-family: 'Inter', 'Helvetica', sans-serif;
                  font-weight: 300; font-size: 18px; fill: #6E746A; }
    ]]></style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="360"/>

  <!-- =====  UPPER-LEFT: UCSC × NVIDIA logos  ===== -->
  <!-- UCSC wordmark (recolored cream for dark bg) -->
