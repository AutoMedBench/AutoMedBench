    </g>
  </svg>

  <!-- × separator -->
  <text class="lx" x="168" y="47">×</text>

  <!-- NVIDIA logo (corporate green still readable on dark bg) -->
  <svg x="186" y="32" width="104" height="22" viewBox="0 0 160 32" preserveAspectRatio="xMinYMid meet">
    <svg x="0" y="1" width="30" height="30" viewBox="0 0 32 32">
      <path fill="#76B900" d="M13.4 11.2v-1.7c.4-.1.9-.1 1.3-.1 4.6-.1 7.7 4 7.7 4s-3.3 4.6-6.8 4.6c-.8 0-1.5-.1-2.2-.4v-5.3c1.8.2 2.2.9 3.2 2.6l2.2-1.8s-1.6-2.1-4.3-2.1c-.3 0-.6 0-1.1.2zm0-5.6v2.5l1.3-.1c6.4-.2 10.6 5.2 10.6 5.2s-4.8 5.8-9.8 5.8c-.4 0-.9 0-1.3-.1v1.5c.4 0 .7.1 1.1.1 4.6 0 7.9-2.4 11.1-5.1.5.4 2.7 1.5 3.1 1.9-3 2.6-10.1 4.7-14.1 4.7-.4 0-.8 0-1.2-.1v2.2h17.3V5.6H13.4zm0 12.1v1.3c-4.3-.8-5.5-5.3-5.5-5.3s2.1-2.3 5.5-2.7v1.5H13.4c-1.8-.2-3.2 1.5-3.2 1.5s.8 2.8 3.2 3.7zM5.5 12.4s2.6-3.9 7.9-4.3V6.6C7.5 7.1 2.4 12 2.4 12s2.9 8.4 11 9.2v-1.5C7.5 18.9 5.5 12.4 5.5 12.4z"/>
    </svg>
    <text x="40" y="24"
          font-family="Helvetica, Arial, sans-serif"
          font-weight="700" font-style="italic"
          font-size="20" letter-spacing="-0.5"
          fill="#76B900">NVIDIA</text>
  </svg>

  <!-- =====  Medical identity badge  ===== -->
  <g transform="translate(40, 88)">
    <polyline class="pulse" points="0,0 6,0 9,-10 15,10 18,0 28,0"/>
    <text class="badge" x="38" y="5">Medical AutoResearch pipeline</text>
  </g>

  <!-- =====  Heading + subhead  ===== -->
  <text class="header"  x="40" y="130">Agent Workflow</text>
  <text class="subhead" x="40" y="152">Every task, every domain — five stages, each scored independently.</text>

  <!-- =========================== S1 PLAN =========================== -->
  <g>
    <rect class="card" x="40" y="188" width="220" height="150" rx="8" ry="8"/>
    <circle class="iconbg" cx="228" cy="216" r="16"/>
    <g class="icon" transform="translate(214, 202)">
      <rect x="5" y="3" width="18" height="22" rx="2"/>
      <rect x="9" y="0" width="10" height="6" rx="1"/>
      <line x1="10" y1="13" x2="18" y2="13"/>
      <line x1="10" y1="18" x2="18" y2="18"/>
    </g>
    <text class="sid"   x="60" y="220">S1</text>
    <text class="sname" x="60" y="252">PLAN</text>
    <text class="sdesc" x="60" y="290">research candidate</text>
    <text class="sdesc" x="60" y="308">models, write plan.md</text>
  </g>
  <path class="arrow"   d="M268 263 H307"/>
  <path class="arrowhd" d="M307 259 L315 263 L307 267 Z"/>

  <!-- =========================== S2 SETUP ========================== -->
  <g>
    <rect class="card" x="323" y="188" width="220" height="150" rx="8" ry="8"/>
    <circle class="iconbg" cx="511" cy="216" r="16"/>
    <g class="icon" transform="translate(497, 202)">
      <path d="M6 18 h8"/>
      <path d="M3 22 h18"/>
      <path d="M14 22 a7 7 0 1 0 0-14 h-1"/>
      <path d="M9 14 h2"/>
      <path d="M8 6 L8 2 h7"/>
      <path d="M11 6 L11 4 h2 v2"/>
    </g>
    <text class="sid"   x="343" y="220">S2</text>
    <text class="sname" x="343" y="252">SETUP</text>
    <text class="sdesc" x="343" y="290">download weights,</text>
    <text class="sdesc" x="343" y="308">install deps, load GPU</text>
  </g>
  <path class="arrow"   d="M551 263 H590"/>
  <path class="arrowhd" d="M590 259 L598 263 L590 267 Z"/>

  <!-- =========================== S3 VALIDATE ======================= -->
  <g>
    <rect class="card" x="606" y="188" width="240" height="150" rx="8" ry="8"/>
    <circle class="iconbg" cx="814" cy="216" r="16"/>
    <g class="icon" transform="translate(800, 202)">
      <path d="M10 2 v6.5 L4 19 a2 2 0 0 0 1.73 3 h12.54 a2 2 0 0 0 1.73-3 L14 8.5 V2"/>
      <line x1="8" y1="2" x2="16" y2="2"/>
      <path d="M7 15 h10"/>
    </g>
    <text class="sid"   x="626" y="220">S3</text>
    <text class="sname" x="626" y="252">VALIDATE</text>
    <text class="sdesc" x="626" y="290">pilot on one sample,</text>
    <text class="sdesc" x="626" y="308">check shape &amp; quality</text>
  </g>
  <path class="arrow"   d="M854 263 H893"/>
  <path class="arrowhd" d="M893 259 L901 263 L893 267 Z"/>

  <!-- =========================== S4 INFERENCE ====================== -->
  <g>
    <rect class="card" x="909" y="188" width="240" height="150" rx="8" ry="8"/>
    <circle class="iconbg" cx="1117" cy="216" r="16"/>
    <g class="icon" transform="translate(1103, 202)">
      <path d="M9.5 2 A2.5 2.5 0 0 1 12 4.5 v15 a2.5 2.5 0 0 1-4.96 0.44 a2.5 2.5 0 0 1-2.96-3.08 a3 3 0 0 1-0.34-5.58 a2.5 2.5 0 0 1 1.32-4.24 a2.5 2.5 0 0 1 1.98-3 A2.5 2.5 0 0 1 9.5 2 Z"/>
      <path d="M14.5 2 A2.5 2.5 0 0 0 12 4.5 v15 a2.5 2.5 0 0 0 4.96 0.44 a2.5 2.5 0 0 0 2.96-3.08 a3 3 0 0 0 0.34-5.58 a2.5 2.5 0 0 0-1.32-4.24 a2.5 2.5 0 0 0-1.98-3 A2.5 2.5 0 0 0 14.5 2 Z"/>
    </g>
    <text class="sid"   x="929" y="220">S4</text>
    <text class="sname" x="929" y="252">INFERENCE</text>
    <text class="sdesc" x="929" y="290">run the full cohort,</text>
    <text class="sdesc" x="929" y="308">save per-sample outputs</text>
  </g>
  <path class="arrow"   d="M1157 263 H1196"/>
  <path class="arrowhd" d="M1196 259 L1204 263 L1196 267 Z"/>

  <!-- =========================== S5 SUBMIT ========================= -->
  <g>
    <rect class="card" x="1212" y="188" width="148" height="150" rx="8" ry="8"/>
    <circle class="iconbg" cx="1328" cy="216" r="16"/>
    <g class="icon" transform="translate(1314, 202)">
      <rect x="5" y="3" width="18" height="22" rx="2"/>
      <rect x="9" y="0" width="10" height="6" rx="1"/>
      <polyline points="10,14 13,17 18,12"/>
    </g>
    <text class="sid"   x="1232" y="220">S5</text>
    <text class="sname" x="1232" y="252">SUBMIT</text>
    <text class="sdesc" x="1232" y="290">verify completeness,</text>
    <text class="sdesc" x="1232" y="308">call submit_results</text>
  </g>
</svg>
