<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-label="AutoMedBench S1 through S5 workflow">
  <defs>
    <style><![CDATA[
      .bg        { fill: #FBFAF5; }
      .card      { fill: #FAFAF7; stroke: #E5E3DB; stroke-width: 1; }
      .sid       { font-family: 'Fraunces', 'Times New Roman', serif; font-weight: 700; font-size: 12px; fill: #6F6F68; letter-spacing: 0.06em; }
      .sname     { font-family: 'Inter', 'Helvetica', sans-serif; font-weight: 700; font-size: 22px; fill: #2B2B25; letter-spacing: 0.02em; }
      .sdesc     { font-family: 'Inter', 'Helvetica', sans-serif; font-weight: 400; font-size: 13px; fill: #5B5B54; }
      .arrow     { stroke: #6F8A52; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .header    { font-family: 'Inter', 'Helvetica', sans-serif; font-weight: 600; font-size: 15px; fill: #2B2B25; letter-spacing: 0.01em; }
      .subhead   { font-family: 'Inter', 'Helvetica', sans-serif; font-weight: 400; font-size: 12px; fill: #6F6F68; }
    ]]></style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="220"/>

  <text class="header"  x="30" y="34">Agent Workflow — S1 → S5</text>
  <text class="subhead" x="30" y="54">Every task in AutoMedBench runs through the same five stages. Each is scored independently.</text>

  <!-- S1 PLAN -->
  <g transform="translate(30, 80)">
    <rect class="card" x="0" y="0" width="200" height="110" rx="8" ry="8"/>
    <text class="sid"   x="14" y="24">S1</text>
    <text class="sname" x="14" y="55">PLAN</text>
    <text class="sdesc" x="14" y="82">Research candidate models,</text>
    <text class="sdesc" x="14" y="98">write plan.md</text>
  </g>
  <path class="arrow" d="M240 135 H262 M258 128 L268 135 L258 142"/>

  <!-- S2 SETUP -->
  <g transform="translate(275, 80)">
    <rect class="card" x="0" y="0" width="200" height="110" rx="8" ry="8"/>
    <text class="sid"   x="14" y="24">S2</text>
    <text class="sname" x="14" y="55">SETUP</text>
    <text class="sdesc" x="14" y="82">Download weights, install deps,</text>
    <text class="sdesc" x="14" y="98">load model on GPU</text>
  </g>
  <path class="arrow" d="M485 135 H507 M503 128 L513 135 L503 142"/>

  <!-- S3 VALIDATE -->
  <g transform="translate(520, 80)">
    <rect class="card" x="0" y="0" width="200" height="110" rx="8" ry="8"/>
    <text class="sid"   x="14" y="24">S3</text>
    <text class="sname" x="14" y="55">VALIDATE</text>
    <text class="sdesc" x="14" y="82">Pilot on one sample, verify</text>
    <text class="sdesc" x="14" y="98">output shape and quality</text>
  </g>
  <path class="arrow" d="M730 135 H752 M748 128 L758 135 L748 142"/>

  <!-- S4 INFERENCE -->
  <g transform="translate(765, 80)">
    <rect class="card" x="0" y="0" width="200" height="110" rx="8" ry="8"/>
    <text class="sid"   x="14" y="24">S4</text>
    <text class="sname" x="14" y="55">INFERENCE</text>
    <text class="sdesc" x="14" y="82">Run the full cohort, save</text>
    <text class="sdesc" x="14" y="98">per-sample outputs</text>
  </g>
  <path class="arrow" d="M975 135 H997 M993 128 L1003 135 L993 142"/>

  <!-- S5 SUBMIT -->
  <g transform="translate(1010, 80)">
    <rect class="card" x="0" y="0" width="160" height="110" rx="8" ry="8"/>
    <text class="sid"   x="14" y="24">S5</text>
    <text class="sname" x="14" y="55">SUBMIT</text>
    <text class="sdesc" x="14" y="82">Verify completeness,</text>
    <text class="sdesc" x="14" y="98">call submit_results</text>
  </g>
</svg>
