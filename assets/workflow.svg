    </g>
  </svg>
  <text class="lx" x="1180" y="127">×</text>
  <svg x="1206" y="103" width="144" height="32" viewBox="0 0 160 32" preserveAspectRatio="xMinYMid meet">
    <svg x="0" y="1" width="30" height="30" viewBox="0 0 32 32">
      <path fill="#76B900" d="M13.4 11.2v-1.7c.4-.1.9-.1 1.3-.1 4.6-.1 7.7 4 7.7 4s-3.3 4.6-6.8 4.6c-.8 0-1.5-.1-2.2-.4v-5.3c1.8.2 2.2.9 3.2 2.6l2.2-1.8s-1.6-2.1-4.3-2.1c-.3 0-.6 0-1.1.2zm0-5.6v2.5l1.3-.1c6.4-.2 10.6 5.2 10.6 5.2s-4.8 5.8-9.8 5.8c-.4 0-.9 0-1.3-.1v1.5c.4 0 .7.1 1.1.1 4.6 0 7.9-2.4 11.1-5.1.5.4 2.7 1.5 3.1 1.9-3 2.6-10.1 4.7-14.1 4.7-.4 0-.8 0-1.2-.1v2.2h17.3V5.6H13.4zm0 12.1v1.3c-4.3-.8-5.5-5.3-5.5-5.3s2.1-2.3 5.5-2.7v1.5H13.4c-1.8-.2-3.2 1.5-3.2 1.5s.8 2.8 3.2 3.7zM5.5 12.4s2.6-3.9 7.9-4.3V6.6C7.5 7.1 2.4 12 2.4 12s2.9 8.4 11 9.2v-1.5C7.5 18.9 5.5 12.4 5.5 12.4z"/>
    </svg>
    <text x="40" y="24" font-family="Helvetica, Arial, sans-serif" font-weight="700"
          font-style="italic" font-size="20" letter-spacing="-0.5" fill="#76B900">NVIDIA</text>
  </svg>

  <!-- ====== Subhead ====== -->
  <text class="subhead" x="40" y="162">Every task, every domain — five stages, each scored independently.</text>

  <!-- ================ STAGE CARDS (5 × 220, y=200-390) ================ -->
  <g>
    <rect class="card" x="70" y="200" width="220" height="190" rx="10" ry="10"/>
    <circle class="iconbg" cx="268" cy="232" r="20"/>
    <g class="icon" transform="translate(256, 220)">
      <rect x="0" y="3" width="18" height="22" rx="2"/>
      <rect x="4" y="0" width="10" height="6" rx="1"/>
      <line x1="5" y1="13" x2="13" y2="13"/>
      <line x1="5" y1="18" x2="13" y2="18"/>
    </g>
    <text class="sid" x="94" y="236">S1</text>
    <text class="sname" x="94" y="276">PLAN</text>
    <text class="sdesc" x="94" y="332">research candidate</text>
    <text class="sdesc" x="94" y="354">models, write plan.md</text>
  </g>
  <path class="arrow" d="M298 295 H322"/>
  <path class="arrowhd" d="M322 290 L332 295 L322 300 Z"/>

  <g>
    <rect class="card" x="330" y="200" width="220" height="190" rx="10" ry="10"/>
    <circle class="iconbg" cx="528" cy="232" r="20"/>
    <g class="icon" transform="translate(516, 220)">
      <path d="M3 18 h8"/>
      <path d="M0 22 h18"/>
      <path d="M13 22 a7 7 0 1 0 0-14 h-1"/>
      <path d="M6 14 h2"/>
      <path d="M5 6 L5 2 h7"/>
      <path d="M8 6 L8 4 h2 v2"/>
    </g>
    <text class="sid" x="354" y="236">S2</text>
    <text class="sname" x="354" y="276">SETUP</text>
    <text class="sdesc" x="354" y="332">download weights,</text>
    <text class="sdesc" x="354" y="354">install deps, load GPU</text>
  </g>
  <path class="arrow" d="M558 295 H582"/>
  <path class="arrowhd" d="M582 290 L592 295 L582 300 Z"/>

  <g>
    <rect class="card" x="590" y="200" width="220" height="190" rx="10" ry="10"/>
    <circle class="iconbg" cx="788" cy="232" r="20"/>
    <g class="icon" transform="translate(776, 220)">
      <path d="M7 2 v6.5 L1 19 a2 2 0 0 0 1.73 3 h12.54 a2 2 0 0 0 1.73-3 L11 8.5 V2"/>
      <line x1="5" y1="2" x2="13" y2="2"/>
      <path d="M4 15 h10"/>
    </g>
    <text class="sid" x="614" y="236">S3</text>
    <text class="sname" x="614" y="276">VALIDATE</text>
    <text class="sdesc" x="614" y="332">pilot on one sample,</text>
    <text class="sdesc" x="614" y="354">check shape &amp; quality</text>
  </g>
  <path class="arrow" d="M818 295 H842"/>
  <path class="arrowhd" d="M842 290 L852 295 L842 300 Z"/>

  <g>
    <rect class="card" x="850" y="200" width="220" height="190" rx="10" ry="10"/>
    <circle class="iconbg" cx="1048" cy="232" r="20"/>
    <g class="icon" transform="translate(1036, 220)">
      <path d="M6.5 2 A2.5 2.5 0 0 1 9 4.5 v15 a2.5 2.5 0 0 1-4.96 0.44 a2.5 2.5 0 0 1-2.96-3.08 a3 3 0 0 1-0.34-5.58 a2.5 2.5 0 0 1 1.32-4.24 a2.5 2.5 0 0 1 1.98-3 A2.5 2.5 0 0 1 6.5 2 Z"/>
      <path d="M11.5 2 A2.5 2.5 0 0 0 9 4.5 v15 a2.5 2.5 0 0 0 4.96 0.44 a2.5 2.5 0 0 0 2.96-3.08 a3 3 0 0 0 0.34-5.58 a2.5 2.5 0 0 0-1.32-4.24 a2.5 2.5 0 0 0-1.98-3 A2.5 2.5 0 0 0 11.5 2 Z"/>
    </g>
    <text class="sid" x="874" y="236">S4</text>
    <text class="sname" x="874" y="276">INFERENCE</text>
    <text class="sdesc" x="874" y="332">run the full cohort,</text>
    <text class="sdesc" x="874" y="354">save per-sample outputs</text>
  </g>
  <path class="arrow" d="M1078 295 H1102"/>
  <path class="arrowhd" d="M1102 290 L1112 295 L1102 300 Z"/>

  <g>
    <rect class="card" x="1110" y="200" width="220" height="190" rx="10" ry="10"/>
    <circle class="iconbg" cx="1308" cy="232" r="20"/>
    <g class="icon" transform="translate(1296, 220)">
      <rect x="0" y="3" width="18" height="22" rx="2"/>
      <rect x="4" y="0" width="10" height="6" rx="1"/>
      <polyline points="5,14 8,17 13,12"/>
    </g>
    <text class="sid" x="1134" y="236">S5</text>
    <text class="sname" x="1134" y="276">SUBMIT</text>
    <text class="sdesc" x="1134" y="332">verify completeness,</text>
    <text class="sdesc" x="1134" y="354">call submit_results</text>
  </g>

  <!-- ================ TASK SHOWCASE STRIP (y=420-560) ================ -->
  <text class="tasklabel" x="40" y="440">Example tasks, one per medical domain:</text>

  <!-- 5 chips × 256w × 90h, gap 10, start x=40 -->
  <!-- 1. Pancreas tumor (Segmentation) -->
  <g>
    <rect class="card" x="40" y="460" width="256" height="90" rx="10" ry="10"/>
    <circle class="ticonbg" cx="84" cy="505" r="24"/>
    <!-- Pancreas outline -->
    <g transform="translate(60, 484)">
      <path class="ticon-s" d="M2 24 Q 4 18 9 19 Q 17 22 28 19 Q 38 18 42 23 Q 44 29 39 31 Q 30 32 22 30 Q 13 31 6 30 Q 2 28 2 24 Z"/>
      <!-- tumor indicator (salmon dot) -->
      <circle class="ticon-fill" cx="32" cy="24" r="2.6"/>
      <!-- dashed segmentation ring -->
      <circle class="ticon-acc" cx="32" cy="24" r="5.5" stroke-dasharray="2 1.5"/>
    </g>
    <text class="dmnlbl" x="122" y="497">Segmentation</text>
    <text class="tname"  x="122" y="524">Pancreas tumor</text>
  </g>

  <!-- 2. LDCT denoising (Enhancement) — lung silhouettes in a CT ring with sparkle -->
  <g>
    <rect class="card" x="306" y="460" width="256" height="90" rx="10" ry="10"/>
    <circle class="ticonbg" cx="350" cy="505" r="24"/>
    <g transform="translate(326, 481)">
      <!-- CT scan ring -->
      <circle class="ticon-s" cx="24" cy="24" r="20"/>
      <!-- Two lung silhouettes inside -->
      <path class="ticon-s" d="M19 14 Q 12 16 11 24 Q 11 30 14 32 Q 17 33 19 31 Z"/>
      <path class="ticon-s" d="M29 14 Q 36 16 37 24 Q 37 30 34 32 Q 31 33 29 31 Z"/>
      <!-- trachea -->
      <line class="ticon-s" x1="24" y1="10" x2="24" y2="15"/>
      <!-- denoising sparkle (salmon) -->
      <g class="ticon-acc">
        <line x1="42" y1="6" x2="46" y2="10"/>
        <line x1="46" y1="6" x2="42" y2="10"/>
      </g>
    </g>
    <text class="dmnlbl" x="388" y="497">Enhancement</text>
    <text class="tname"  x="388" y="524">LDCT denoising</text>
  </g>

  <!-- 3. CXR findings (Report Generation) — chest X-ray + document lines -->
  <g>
    <rect class="card" x="572" y="460" width="256" height="90" rx="10" ry="10"/>
    <circle class="ticonbg" cx="616" cy="505" r="24"/>
    <g transform="translate(593, 482)">
      <!-- CXR frame -->
      <rect class="ticon-s" x="2" y="2" width="28" height="40" rx="2.5"/>
      <!-- Ribcage curves -->
      <path class="ticon-s" d="M6 10 Q 16 8 26 10"/>
      <path class="ticon-s" d="M6 16 Q 16 14 26 16"/>
      <!-- lungs hints -->
      <ellipse class="ticon-s" cx="11" cy="28" rx="3.5" ry="7"/>
      <ellipse class="ticon-s" cx="21" cy="28" rx="3.5" ry="7"/>
      <!-- report arrow out to lines -->
      <line class="ticon-acc" x1="34" y1="22" x2="40" y2="22"/>
      <line class="ticon-acc" x1="37" y1="19" x2="40" y2="22"/>
      <line class="ticon-acc" x1="37" y1="25" x2="40" y2="22"/>
    </g>
    <text class="dmnlbl" x="654" y="497">Report Generation</text>
    <text class="tname"  x="654" y="524">CXR findings</text>
  </g>

  <!-- 4. Medical VQA — scan + question bubble -->
  <g>
    <rect class="card" x="838" y="460" width="256" height="90" rx="10" ry="10"/>
    <circle class="ticonbg" cx="882" cy="505" r="24"/>
    <g transform="translate(859, 482)">
      <!-- Medical scan square -->
      <rect class="ticon-s" x="1" y="3" width="22" height="22" rx="2"/>
      <!-- cross marker (medical scan hint) -->
      <line class="ticon-s" x1="12" y1="10" x2="12" y2="18"/>
      <line class="ticon-s" x1="8" y1="14" x2="16" y2="14"/>
      <!-- Question bubble lower-right -->
      <circle class="ticon-acc" cx="32" cy="32" r="9"/>
      <path class="ticon-acc" d="M29 30 a2.6 2.6 0 0 1 5.2 0 c 0 1.6 -2.6 2.1 -2.6 3.5"/>
      <circle class="ticon-fill" cx="31.6" cy="37" r="1"/>
    </g>
    <text class="dmnlbl" x="920" y="497">VQA</text>
    <text class="tname"  x="920" y="524">Expert medical VQA</text>
  </g>

  <!-- 5. CXR abnormality detection — chest with bounding box -->
  <g>
    <rect class="card" x="1104" y="460" width="256" height="90" rx="10" ry="10"/>
    <circle class="ticonbg" cx="1148" cy="505" r="24"/>
    <g transform="translate(1125, 482)">
      <!-- CXR frame -->
      <rect class="ticon-s" x="2" y="2" width="28" height="40" rx="2.5"/>
      <!-- Lungs -->
      <ellipse class="ticon-s" cx="11" cy="20" rx="4" ry="10"/>
      <ellipse class="ticon-s" cx="21" cy="20" rx="4" ry="10"/>
      <!-- Detection bounding box (dashed salmon) -->
      <rect class="ticon-acc" x="17" y="12" width="10" height="10" stroke-dasharray="2 1.2"/>
      <!-- lesion dot inside box -->
      <circle class="ticon-fill" cx="22" cy="17" r="1.6"/>
    </g>
    <text class="dmnlbl" x="1186" y="497">Lesion Detection</text>
    <text class="tname"  x="1186" y="524">CXR abnormality</text>
  </g>
</svg>
