<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 580" width="1400" height="580"
     role="img" aria-label="Medical AutoResearch pipeline — UC Santa Cruz × NVIDIA — S1 Plan, S2 Setup, S3 Validate, S4 Inference, S5 Submit">
  <defs>
    <style><![CDATA[
      .bg        { fill: #141812; }
      .card      { fill: #1C201B; stroke: #2A2E28; stroke-width: 1.4; }
      .iconbg    { fill: #232A25; }
      .icon      { stroke: #84B38D; stroke-width: 2.2; fill: none;
                   stroke-linecap: round; stroke-linejoin: round; }
      .iconfill  { fill: #84B38D; }
      .pulse     { stroke: #D88A7B; stroke-width: 2.8; fill: none;
                   stroke-linecap: round; stroke-linejoin: round; }
      .sid       { font-family: 'Fraunces', 'Georgia', 'Times New Roman', serif;
                   font-weight: 700; font-size: 16px; fill: #84B38D;
                   letter-spacing: 0.12em; }
      .sname     { font-family: 'Inter', 'Helvetica', sans-serif;
                   font-weight: 700; font-size: 30px; fill: #E4E6DC;
                   letter-spacing: 0.02em; }
      .sdesc     { font-family: 'Inter', 'Helvetica', sans-serif;
                   font-weight: 400; font-size: 16px; fill: #A0A69A; }
      .arrow     { stroke: #7E9770; stroke-width: 3; fill: none;
                   stroke-linecap: round; stroke-linejoin: round; }
      .arrowhd   { fill: #7E9770; }
      .header    { font-family: 'Fraunces', 'Georgia', 'Times New Roman', serif;
                   font-weight: 600; font-style: italic; font-size: 34px;
                   fill: #E4E6DC; }
      .badge     { font-family: 'Inter', 'Helvetica', sans-serif;
                   font-weight: 600; font-size: 15px; fill: #D88A7B;
                   letter-spacing: 0.14em; text-transform: uppercase; }
      .subhead   { font-family: 'Inter', 'Helvetica', sans-serif;
                   font-weight: 400; font-size: 17px; fill: #A0A69A; }
      .lx        { font-family: 'Inter', 'Helvetica', sans-serif;
                   font-weight: 300; font-size: 26px; fill: #6E746A; }
      .tasklabel { font-family: 'Fraunces', 'Georgia', 'Times New Roman', serif;
                   font-weight: 500; font-style: italic; font-size: 18px;
                   fill: #A0A69A; }
      .dmnlbl    { font-family: 'Inter', 'Helvetica', sans-serif;
                   font-weight: 600; font-size: 11px; fill: #7E9770;
                   letter-spacing: 0.14em; text-transform: uppercase; }
      .tname     { font-family: 'Inter', 'Helvetica', sans-serif;
                   font-weight: 500; font-size: 16px; fill: #E4E6DC; }
      .ticon     { stroke: #C6A98A; stroke-width: 2; fill: none;
                   stroke-linecap: round; stroke-linejoin: round; }
      .ticonbg   { fill: #2A2620; }
    ]]></style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="580"/>

  <!-- =====  TOP: medical identity badge (left)  ===== -->
  <g transform="translate(40, 42)">
    <polyline class="pulse" points="0,0 8,0 12,-14 20,14 24,0 36,0"/>
    <text class="badge" x="48" y="7">Medical AutoResearch pipeline</text>
  </g>

  <!-- =====  TITLE ROW: heading (left) · logos (right)  ===== -->
  <text class="header" x="40" y="128">Agent Workflow</text>

  <!-- UCSC logo on right -->
  <svg x="1000" y="99" width="168" height="40" viewBox="0 0 250 60.757271" preserveAspectRatio="xMinYMid meet">
